workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
    - when: never

stages:
  - release

release:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      TAG="${CI_COMMIT_TAG#v}"
      NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/^$/d')
      echo "Creating release for $CI_COMMIT_TAG"
      echo "$NOTES"

      PAYLOAD="{
          \"name\": \"Torii ${CI_COMMIT_TAG}\",
          \"tag_name\": \"${CI_COMMIT_TAG}\",
          \"description\": $(echo "$NOTES" | jq -Rs .),
          \"assets\": {
            \"links\": [
              {\"name\": \"Install via cargo\", \"url\": \"https://crates.io/crates/gitorii\", \"link_type\": \"other\"},
              {\"name\": \"Changelog\", \"url\": \"https://gitlab.com/paskidev/torii/-/blob/main/CHANGELOG.md\", \"link_type\": \"other\"}
            ]
          }
        }"

      HTTP_STATUS=$(curl -s -o /tmp/release_resp.json -w "%{http_code}" \
        --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$PAYLOAD" \
        "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/releases")

      echo "GitLab API response: $HTTP_STATUS"
      cat /tmp/release_resp.json

      if [ "$HTTP_STATUS" = "201" ]; then
        echo "Release created."
      elif [ "$HTTP_STATUS" = "409" ]; then
        echo "Release already exists — skipping."
      else
        echo "Unexpected status $HTTP_STATUS" && exit 1
      fi

