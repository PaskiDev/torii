stages:
  - release

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
  script:
    - |
      # Extract changelog section for this tag from CHANGELOG.md
      TAG="${CI_COMMIT_TAG#v}"
      NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
      echo "$NOTES" > release_notes.txt
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Torii $CI_COMMIT_TAG"
    description: "./release_notes.txt"
    assets:
      links:
        - name: "Install via cargo"
          url: "https://crates.io/crates/gitorii"
          link_type: "other"
        - name: "Changelog"
          url: "https://gitlab.com/paskidev/torii/-/blob/main/CHANGELOG.md"
          link_type: "other"
